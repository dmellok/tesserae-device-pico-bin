; PlatformIO project configuration for tesserae-device-pico-bin.
;
; Target: Pimoroni Pico Plus 2 W (RP2350B + RM2/CYW43 wireless) driving a
; Pimoroni Inky Impression e-paper panel over a Hard Stuff "Pico to Pi Hat".
; See README.md for the pin map and the supported-panel list.
;
; Framework: the official Raspberry Pi Pico SDK ("picosdk"), provided for
; RP2350 + CYW43 by the maxgerhardt fork of the PlatformIO raspberrypi platform.
; The W board pulls in the CYW43 driver + lwIP networking stack; the project
; supplies include/lwipopts.h to configure lwIP.

[env:pimoroni_pico_plus_2w]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pimoroni_pico_plus_2w
framework = picosdk

; stdio over USB CDC (printf shows on the serial monitor); never block at boot
; waiting for a host.
build_flags =
    -DPIO_STDIO_USB

; Open the USB serial monitor with: pio device monitor
monitor_speed = 115200
