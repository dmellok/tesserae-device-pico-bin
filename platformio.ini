; PlatformIO project configuration for tesserae-device-pico-bin.
;
; Target: Pimoroni Pico Plus 2 (RP2350B) driving a Pimoroni Inky Impression
; 13.3" (EL133UF1 / Spectra 6, 1200x1600, 6 colours) over a Hard Stuff
; "Pico to Pi Hat" adapter. See README.md for the full pin map.
;
; Framework note: we use the official Raspberry Pi Pico SDK ("picosdk"),
; which is provided for RP2350 by the maxgerhardt fork of the PlatformIO
; raspberrypi platform. The stock "raspberrypi" platform does not ship a
; picosdk framework, so the git URL below is required, not optional.

[env:pimoroni_pico_plus_2]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pimoroni_pico_plus_2
framework = picosdk

; stdio goes to USB CDC, so printf() shows up on the serial monitor. This is
; the framework default; we state it so the intent is obvious. The connect
; wait timeout stays at its default of 0, so the firmware never blocks at boot
; waiting for a host to open the port: the panel paints whether or not anyone
; is watching the serial output.
build_flags =
    -DPIO_STDIO_USB

; Open the USB serial monitor with: pio device monitor
monitor_speed = 115200
